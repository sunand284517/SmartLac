version: '3.8'

services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    depends_on:
      - redis
      - mongodb
    environment:
      - REDIS_URL=redis://redis:6379
      - MONGO_URI=mongodb://mongodb:27017/cow_sonogram
      - PORT=5000

  ml_worker:
    build: ./ml_worker
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379